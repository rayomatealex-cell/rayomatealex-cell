<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Nuevo Mes</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 600px;
  text-align: center;
  padding: 40px;
  border: 1px solid #30363d;
  border-radius: 16px;
  background: #161b22;
  animation: fadeIn 2s ease;
}

h1 {
  font-size: 2.5em;
  margin-bottom: 10px;
}

.line {
  width: 50px;
  height: 3px;
  background: #ff4da6;
  margin: 20px auto;
}

p {
  font-size: 1.1em;
  line-height: 1.6;
}

button {
  margin-top: 25px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid #ff4da6;
  color: #ff4da6;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #ff4da6;
  color: white;
}

.extra {
  margin-top: 20px;
  display: none;
  color: #ffccd5;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Feliz Nuevo Mes</h1>
  <div class="line"></div>

  <p>
    Un nuevo mes comienza.  
    Nuevas oportunidades, nuevos momentos  
    y muchas cosas por vivir.
  </p>

  <p>
    Espero que este mes te traiga calma,  
    alegría y todo lo que estás buscando.
  </p>

  <button onclick="mostrar()">Leer más</button>

  <p class="extra" id="extra">
    Gracias por estar aquí.  
    De verdad.
  </p>
</div>

<script>
function mostrar(){
  document.getElementById("extra").style.display = "block";
}
</script>

</body>
</html>
